<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphism Keyboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="keyboard-container">
        <textarea id="display" readonly placeholder="Clique nas teclas para escrever..."></textarea>

        <div class="keyboard-row">
            <button class="key">Q</button>
            <button class="key">W</button>
            <button class="key">E</button>
            <button class="key">R</button>
            <button class="key">T</button>
            <button class="key">Y</button>
            <button class="key">U</button>
            <button class="key">I</button>
            <button class="key">O</button>
            <button class="key">P</button>
        </div>

        <div class="keyboard-row">
            <button class="key">A</button>
            <button class="key">S</button>
            <button class="key">D</button>
            <button class="key">F</button>
            <button class="key">G</button>
            <button class="key">H</button>
            <button class="key">J</button>
            <button class="key">K</button>
            <button class="key">L</button>
        </div>

        <div class="keyboard-row">
            <button class="key">Z</button>
            <button class="key">X</button>
            <button class="key">C</button>
            <button class="key">V</button>
            <button class="key">B</button>
            <button class="key">N</button>
            <button class="key">M</button>
            <button class="key action-key" id="backspace">⌫</button> 
        </div>

        <div class="keyboard-row">
            <button class="key space-key" id="space">SPACE</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const keys = document.querySelectorAll('.key');

        keys.forEach(key => {
            key.addEventListener('click', () => {
                const keyText = key.textContent;

                if (key.id === 'space') {
                    display.value += ' ';
                } else if (key.id === 'backspace') {
                    display.value = display.value.slice(0, -1);
                } else {
                    display.value += keyText;
                }
                
                // Rola o scroll do textarea automaticamente para baixo ao digitar
                display.scrollTop = display.scrollHeight; 
            });
        });
    </script>

</body>
</html>
